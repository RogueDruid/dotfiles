# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info


# Set MMOD
$mod = super
# bind = $mod , return, exec, terminator --i=~/.config/terminator/terminator.png 
bind = $mod , return , exec, ghostty +new-window 
# bind = SUPER, return, exec, ghostty +new-window
bind = $mod, D, exec, rofi -show combi -theme hypr -show-icons
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit
bind = $mod, C, killactive

# Copy Screen Region
bind = $mod SHIFT, P, exec, hyprshot -m region

# Clipboard manager
bind = SUPER, V, exec, cursor-clip
# bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy


# bind = SUPER, T, togglefloating   

bind = $mod, code:60 , exec, bemoji -t

# Move focus
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# bind = SUPER, U, layoutmsg, preselect u
# bind = SUPER, D, layoutmsg, preselect d   


# Resize Windows
bind = $mod, A, submap, fastedit
submap = fastedit
bind = CTRL, right, resizeactive, 10 0
bind = CTRL, left, resizeactive, -10 0
bind = CTRL, up, resizeactive, 0 -10
bind= CTRL, down, resizeactive, 0 10
binde = , left, movefocus, l
binde = , right, movefocus, r
binde = , up, movefocus, u
binde = , down, movefocus, d
bind = SHIFT, left, movewindow, l
bind = SHIFT, right, movewindow, r
bind = SHIFT, up, movewindow, u
bind = SHIFT, down, movewindow, d
bind = , escape, submap, reset
submap = reset

